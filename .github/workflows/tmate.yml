# .github/workflows/debug.yml
name: Debug with tmate

on:
  workflow_dispatch:
  pull_request:

jobs:
  debug:
    runs-on: blacksmith-2vcpu-ubuntu-2204 
    timeout-minutes: 60  
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install required Python dependencies
        run: |
          pip install --upgrade pip
          pip install \
            ansible==10.6.0 \
            asn1crypto==1.5.1 \
            bcrypt==4.1.3 \
            chardet==5.2.0 \
            colorclass==2.2.2 \
            colorlog==6.8.2 \
            docopt==0.6.2 \
            enum34==1.1.10 \
            google-auth==2.32.0 \
            google-api-python-client==2.134.0 \
            google-cloud-monitoring==2.22.0 \
            google-cloud-storage==2.17.0 \
            ipaddress==1.0.23 \
            jmespath==1.0.1 \
            kubernetes==30.1.0 \
            netaddr==1.3.0 \
            oauth2client==4.1.3 \
            packaging==24.1 \
            paramiko==3.4.0 \
            pycrypto==2.6.1 \
            pycryptodome==3.20.0 \
            PyGithub==2.3.0 \
            pytz==2024.1 \
            terminaltables==3.1.10

      - name: List installed packages
        run: pip freeze

      - name: Set up tmate session
        uses: mxschmitt/action-tmate@v3

