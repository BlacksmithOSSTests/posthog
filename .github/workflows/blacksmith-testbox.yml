# Benchmark workflow: compares single-threaded vs pytest-xdist -n 2 on a Django shard.
#
# Experiments:
#   A) Baseline:  single-threaded pytest on one shard
#   B) xdist-1ch: pytest -n 2, both workers share one ClickHouse (different DBs)
#   C) xdist-2ch: pytest -n 2, each worker gets its own ClickHouse instance
#
# Also supports SSH testbox mode (pass testbox_id to keep runner alive for
# interactive commands via: blacksmith testbox run --id <id> "<cmd>")
#
# Results appear in the "Print benchmark summary" step at the end.

name: Blacksmith – Django xdist benchmark

on:
    workflow_dispatch:
        inputs:
            testbox_id:
                description: 'Optional: testbox session ID for interactive SSH access'
                type: string
                required: false
            test_path:
                description: 'pytest path to benchmark (default: posthog/hogql_queries/test/)'
                type: string
                default: 'posthog/hogql_queries/test/'
            run_xdist_single_ch:
                description: 'Run xdist -n 2 with single ClickHouse (experiment B)'
                type: boolean
                default: true
            run_xdist_dual_ch:
                description: 'Run xdist -n 2 with two ClickHouse instances (experiment C)'
                type: boolean
                default: true

jobs:
    benchmark:
        name: Django xdist benchmark (2vCPU Blacksmith)
        runs-on: blacksmith-2vcpu-ubuntu-2404
        timeout-minutes: 90

        env:
            SECRET_KEY: '6b01eee4f945ca25045b5aab440b953461faf08693a9abbf1166dc7c6b9772da'
            DATABASE_URL: 'postgres://posthog:posthog@localhost:5432/posthog'
            REDIS_URL: 'redis://localhost'
            CLICKHOUSE_HOST: 'localhost'
            CLICKHOUSE_SECURE: 'False'
            CLICKHOUSE_VERIFY: 'False'
            TEST: 1
            DISPLAY: ':99.0'
            UV_HTTP_TIMEOUT: 120
            OBJECT_STORAGE_ENABLED: 'True'
            OBJECT_STORAGE_ENDPOINT: 'http://localhost:19000'
            OBJECT_STORAGE_ACCESS_KEY_ID: 'object_storage_root_user'
            OBJECT_STORAGE_SECRET_ACCESS_KEY: 'object_storage_root_password'

        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 1
                  lfs: true
                  clean: false

            # SSH testbox mode — omit testbox_id to run benchmarks without SSH.
            - name: Begin testbox session (SSH access)
              if: ${{ inputs.testbox_id != '' }}
              uses: useblacksmith/begin-testbox@v1
              with:
                  testbox_id: ${{ inputs.testbox_id }}

            # Core services only — no temporal, no Elasticsearch.
            # Saves ~30s + avoids 512MB JVM memory pressure on the 2vCPU runner.
            - name: Start Docker (core only — no temporal/elasticsearch)
              env:
                  COMPOSE_FILE: docker-compose.dev.yml:docker-compose.profiles.yml
                  COMPOSE_PROFILES: ''
              run: |
                  cp posthog/user_scripts/latest_user_defined_function.xml docker/clickhouse/user_defined_function.xml
                  bin/ci-wait-for-docker launch --background --down-all-profiles

            - name: Add service hostnames to /etc/hosts
              run: echo "127.0.0.1 db redis7 kafka clickhouse clickhouse-coordinator objectstorage seaweedfs" | sudo tee -a /etc/hosts

            - name: Set up Python 3.12
              uses: actions/setup-python@v5
              with:
                  python-version: '3.12.12'

            - name: Install uv
              uses: astral-sh/setup-uv@v7
              with:
                  version: '0.10.2'
                  enable-cache: true
                  cache-dependency-glob: uv.lock

            - name: Install SAML dependencies
              run: sudo apt-get update && sudo apt-get install -y libxml2-dev libxmlsec1-dev libxmlsec1-openssl

            - name: Install Python dependencies
              run: UV_PROJECT_ENVIRONMENT=$pythonLocation uv sync --frozen --dev

            # Qt libs prevent spurious exit code 134 after tests pass
            - name: Install Qt libraries
              uses: awalsh128/cache-apt-pkgs-action@acb598e5ddbc6f68a970c5da0688d2f3a9f04d05 # v1.6.0
              with:
                  packages: libegl1 libdbus-1-3 libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 libxcb-xinput0 libxcb-xfixes0 x11-utils libxcb-cursor0 libopengl0
                  version: 1.0

            - name: Install Rust
              uses: dtolnay/rust-toolchain@0b1efabc08b657293548b77fb76cc02d26091c7e
              with:
                  toolchain: 1.91.1
                  components: cargo

            - name: Cache Rust/sqlx-cli build
              uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
              with:
                  shared-key: 'testbox-sqlx-cli'
                  workspaces: rust
                  save-if: 'true'

            - name: Install sqlx-cli
              run: |
                  cargo install sqlx-cli \
                    --version 0.8.0 \
                    --features postgres \
                    --no-default-features \
                    --locked \
                    --root "$RUNNER_TEMP/sqlx-cli"
                  echo "$RUNNER_TEMP/sqlx-cli/bin" >> "$GITHUB_PATH"

            - name: Install pytest-xdist
              run: pip install pytest-xdist

            - name: Set up needed files
              run: |
                  mkdir -p frontend/dist
                  touch frontend/dist/index.html frontend/dist/layout.html frontend/dist/exporter.html
                  ./bin/download-mmdb

            - name: Wait for Docker services
              env:
                  COMPOSE_FILE: docker-compose.dev.yml:docker-compose.profiles.yml
                  COMPOSE_PROFILES: ''
              run: bin/ci-wait-for-docker wait

            - name: Print runner info
              run: |
                  echo "CPUs: $(nproc)  RAM: $(free -h | awk '/^Mem:/{print $2}')"
                  echo "Docker containers:"
                  docker ps --format "table {{.Names}}\t{{.Status}}" || true

            # ─── EXPERIMENT A: baseline single-threaded ────────────────────────────
            - name: 'Benchmark A — baseline: single-threaded'
              id: bench_a
              continue-on-error: true
              run: |
                  echo "::group::Benchmark A — single-threaded"
                  START=$(date +%s)
                  pytest --tb=short -q \
                    ${{ inputs.test_path }} \
                    -m "not async_migrations" \
                    --timeout=300 --timeout-func-only \
                    -p no:xdist \
                    2>&1
                  EXIT=$?
                  END=$(date +%s)
                  echo "::endgroup::"
                  ELAPSED=$((END - START))
                  echo "A_SECONDS=$ELAPSED" >> "$GITHUB_ENV"
                  echo "### Benchmark A done: ${ELAPSED}s (exit $EXIT) ###"
                  [ $EXIT -eq 0 ] || [ $EXIT -eq 5 ]

            # ─── EXPERIMENT B: xdist -n 2, single ClickHouse ──────────────────────
            - name: 'Benchmark B — xdist -n 2 (single ClickHouse, separate DBs)'
              id: bench_b
              if: ${{ inputs.run_xdist_single_ch }}
              continue-on-error: true
              run: |
                  echo "::group::Benchmark B — xdist -n 2, single ClickHouse"
                  echo "gw0 → posthog_test_gw0 on :8123"
                  echo "gw1 → posthog_test_gw1 on :8123 (shared instance, separate DB)"
                  START=$(date +%s)
                  pytest --tb=short -q \
                    ${{ inputs.test_path }} \
                    -m "not async_migrations" \
                    --timeout=300 --timeout-func-only \
                    -n 2 \
                    2>&1
                  EXIT=$?
                  END=$(date +%s)
                  echo "::endgroup::"
                  ELAPSED=$((END - START))
                  echo "B_SECONDS=$ELAPSED" >> "$GITHUB_ENV"
                  echo "### Benchmark B done: ${ELAPSED}s (exit $EXIT) ###"
                  [ $EXIT -eq 0 ] || [ $EXIT -eq 5 ]

            # ─── EXPERIMENT C: xdist -n 2, two ClickHouse instances ───────────────
            - name: 'Start second ClickHouse on port 8124'
              if: ${{ inputs.run_xdist_dual_ch }}
              run: |
                  CLICKHOUSE_IMAGE=$(docker inspect posthog-clickhouse-1 \
                    --format '{{.Config.Image}}' 2>/dev/null || echo "clickhouse/clickhouse-server:26.3.9.8")
                  echo "Using image: $CLICKHOUSE_IMAGE"
                  docker run -d \
                    --name clickhouse2 \
                    --network posthog_default \
                    -p 8124:8123 \
                    -e CLICKHOUSE_SKIP_USER_SETUP=1 \
                    -v "$PWD/docker/clickhouse/users-dev.xml:/etc/clickhouse-server/users.xml" \
                    -v "$PWD/docker/clickhouse/config.xml:/etc/clickhouse-server/config.xml" \
                    -v "$PWD/docker/clickhouse/config.d/default.xml:/etc/clickhouse-server/config.d/default.xml" \
                    -v "$PWD/posthog/user_scripts:/var/lib/clickhouse/user_scripts" \
                    -v "$PWD/posthog/user_scripts/latest_user_defined_function.xml:/etc/clickhouse-server/user_defined_function.xml" \
                    "$CLICKHOUSE_IMAGE"
                  echo "Waiting for second ClickHouse on :8124..."
                  timeout 90 bash -c 'until curl -sf http://localhost:8124/ping 2>/dev/null; do sleep 3; done'
                  echo "Second ClickHouse ready."

            - name: 'Benchmark C — xdist -n 2 (two ClickHouse instances)'
              id: bench_c
              if: ${{ inputs.run_xdist_dual_ch }}
              continue-on-error: true
              env:
                  CH_XDIST_ROUTING: '1'
              run: |
                  echo "::group::Benchmark C — xdist -n 2, two ClickHouse instances"
                  echo "gw0 → posthog_test_gw0 on :8123 (primary ClickHouse)"
                  echo "gw1 → posthog_test_gw1 on :8124 (second ClickHouse)"
                  echo "Routing controlled by CH_XDIST_ROUTING=1 + root conftest.py"
                  START=$(date +%s)
                  pytest --tb=short -q \
                    ${{ inputs.test_path }} \
                    -m "not async_migrations" \
                    --timeout=300 --timeout-func-only \
                    -n 2 \
                    2>&1
                  EXIT=$?
                  END=$(date +%s)
                  echo "::endgroup::"
                  ELAPSED=$((END - START))
                  echo "C_SECONDS=$ELAPSED" >> "$GITHUB_ENV"
                  echo "### Benchmark C done: ${ELAPSED}s (exit $EXIT) ###"
                  [ $EXIT -eq 0 ] || [ $EXIT -eq 5 ]

            # ─── RESULTS ──────────────────────────────────────────────────────────
            - name: Print benchmark summary
              if: always()
              run: |
                  echo ""
                  echo "════════════════════════════════════════════════════"
                  echo "  BENCHMARK RESULTS — 2vCPU Blacksmith runner"
                  echo "  Test path: ${{ inputs.test_path }}"
                  echo "════════════════════════════════════════════════════"
                  echo ""

                  A=${A_SECONDS:-"(skipped)"}
                  B=${B_SECONDS:-"(skipped)"}
                  C=${C_SECONDS:-"(skipped)"}

                  echo "  A) Single-threaded baseline:        ${A}s"
                  echo "  B) xdist -n 2 (1 ClickHouse):       ${B}s"
                  echo "  C) xdist -n 2 (2 ClickHouse nodes): ${C}s"
                  echo ""

                  if [[ "$A" =~ ^[0-9]+$ && "$B" =~ ^[0-9]+$ && "$A" -gt 0 ]]; then
                    SPEEDUP_B=$(echo "scale=2; $A / $B" | bc)
                    SAVING_B=$((A - B))
                    echo "  B vs A speedup: ${SPEEDUP_B}x  (${SAVING_B}s saved)"
                  fi

                  if [[ "$A" =~ ^[0-9]+$ && "$C" =~ ^[0-9]+$ && "$A" -gt 0 ]]; then
                    SPEEDUP_C=$(echo "scale=2; $A / $C" | bc)
                    SAVING_C=$((A - C))
                    echo "  C vs A speedup: ${SPEEDUP_C}x  (${SAVING_C}s saved)"
                  fi

                  if [[ "$B" =~ ^[0-9]+$ && "$C" =~ ^[0-9]+$ && "$B" -gt 0 ]]; then
                    SPEEDUP_BC=$(echo "scale=2; $B / $C" | bc)
                    echo "  C vs B speedup: ${SPEEDUP_BC}x  (dual-CH benefit)"
                  fi

                  echo ""
                  echo "════════════════════════════════════════════════════"
